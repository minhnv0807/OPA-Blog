services:
  app:
    build:
      context: .
      dockerfile: Dockerfile.dev
    container_name: blog_opa_dev
    restart: unless-stopped
    env_file: .env.local
    environment:
      NODE_ENV: development
      MONGODB_URI: mongodb://root:devpass123@mongo:27017/blog-opa?authSource=admin
    ports:
      - '3000:3000'
    volumes:
      - ./src:/app/src
      - ./public:/app/public
    depends_on:
      mongo:
        condition: service_healthy
    networks:
      - blog_net

  mongo:
    image: mongo:7.0
    container_name: blog_opa_mongo_dev
    restart: unless-stopped
    environment:
      MONGO_INITDB_ROOT_USERNAME: root
      MONGO_INITDB_ROOT_PASSWORD: devpass123
    ports:
      - '27017:27017'
    volumes:
      - mongo_dev_data:/data/db
    networks:
      - blog_net
    healthcheck:
      test: echo 'db.runCommand("ping").ok' | mongosh localhost:27017/test --quiet
      interval: 10s
      timeout: 5s
      retries: 5

networks:
  blog_net:
    driver: bridge

volumes:
  mongo_dev_data:
